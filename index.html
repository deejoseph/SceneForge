<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Ceramic Designer</title>

<style>
body { font-family: Arial; padding: 20px; }

.step { display:none; margin-top:20px; }
.active { display:block; }

button { margin:5px; padding:8px 12px; cursor:pointer; }
button:disabled { background:#ccc; cursor:not-allowed; }

#progress {
  width:100%; height:10px;
  background:#eee; border-radius:5px;
}
#bar {
  height:100%; width:0%;
  background:#4caf50;
  transition:0.3s;
}

#topControls {
  margin-top:10px;
  display:flex;
  gap:10px;
}

.image-card {
  display:flex;
  flex-direction:column;
  align-items:center;
}

.image-card img {
  width:300px;
  border-radius:10px;
  cursor:pointer;
}

#modal {
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.8);
  justify-content:center;
  align-items:center;
}
#modal img {
  max-width:80%;
  max-height:80%;
}

#generator {
  margin-top:40px;
  border-top:2px solid #ddd;
  padding-top:20px;
}
</style>
</head>

<body>

<h2>陶艺定制引导</h2>

<div id="progress"><div id="bar"></div></div>

<div id="topControls">
  <button id="prevBtn" onclick="prevStep()">⬅ 上一步</button>
  <button id="nextBtn" onclick="nextAuto()">下一步 ➡</button>
  <button onclick="confirmScene()">✅ 确认场景</button>
  <button onclick="resetAll()">🔄 重新开始</button>
</div>

<!-- STEP -->
<div class="step active" id="step1">
  <h3>用途</h3>
  <button onclick="selectPurpose('self')">自用</button>
  <button onclick="selectPurpose('gift')">送礼</button>
</div>

<div class="step" id="step2_self">
  <h3>是否需要包装？</h3>
  <button onclick="setPackagingNeed(false)">不需要</button>
  <button onclick="setPackagingNeed(true)">需要</button>
</div>

<div class="step" id="step2_pack">
  <h3>选择包装</h3>
  <button onclick="setPackaging('simple')">基础包装</button>
  <button onclick="setPackaging('premium')">高端包装</button>
</div>

<div class="step" id="step3">
  <h3>交付时间</h3>
  <button onclick="setDeadline('strict')">严格</button>
  <button onclick="setDeadline('flexible')">宽松</button>
</div>

<div class="step" id="step4">
  <h3>场景</h3>
  <button onclick="setScene('tea room')">茶室</button>
  <button onclick="setScene('home')">家居</button>
  <button onclick="setScene('office')">办公室</button>
</div>

<div class="step" id="step5">
  <h3>氛围</h3>
  <button onclick="setMood('zen')">禅意</button>
  <button onclick="setMood('warm')">温暖</button>
  <button onclick="setMood('luxury')">高级</button>
</div>

<!-- 生成区 -->
<div id="generator">

<h2>场景氛围预览</h2>

<p id="finalPrompt"></p>

<button onclick="generate()">生成场景预览</button>

<h3>场景参考图</h3>

<p style="color:#666;font-size:14px;">
这是氛围参考，不是产品设计。确认后进入设计阶段。
</p>

<div id="results" style="display:flex; gap:20px;"></div>

</div>

<!-- 放大 -->
<div id="modal" onclick="closeModal()">
  <img id="modalImg">
</div>

<script>

/* ===== 步骤 ===== */

let steps = ["step1","step2_self","step2_pack","step3","step4","step5"]
let currentStepIndex = 0

function showStep(id){
  document.querySelectorAll(".step").forEach(s=>s.classList.remove("active"))
  document.getElementById(id).classList.add("active")
}

function updateProgress(){
  let percent = currentStepIndex/(steps.length-1)*100
  document.getElementById("bar").style.width = percent + "%"
  document.getElementById("prevBtn").disabled = currentStepIndex===0
  document.getElementById("nextBtn").disabled = currentStepIndex===steps.length-1
}

/* ===== 数据 ===== */

let formData = {
  purpose:null,
  packaging:null,
  deadline:null,
  scene:null,
  mood:null,
  style:""
}

/* ===== 导航 ===== */

function nextStep(id){
  currentStepIndex = steps.indexOf(id)
  showStep(id)
  updateProgress()
}

function prevStep(){
  if(currentStepIndex<=0) return
  currentStepIndex--
  showStep(steps[currentStepIndex])
  updateProgress()
}

function nextAuto(){
  if(currentStepIndex>=steps.length-1) return
  currentStepIndex++
  showStep(steps[currentStepIndex])
  updateProgress()
}

/* ===== 逻辑 ===== */

function selectPurpose(p){
  formData.purpose=p
  p==="self"?nextStep("step2_self"):nextStep("step2_pack")
}

function setPackagingNeed(need){
  if(!need){
    formData.packaging="none"
    nextStep("step3")
  }else nextStep("step2_pack")
}

function setPackaging(t){ formData.packaging=t; nextStep("step3") }
function setDeadline(t){ formData.deadline=t; nextStep("step4") }
function setScene(s){ formData.scene=s; nextStep("step5") }

function setMood(m){
  formData.mood=m

  // ✅ style绑定（关键）
  if(m==="zen") formData.style="minimalist, zen, calm, soft lighting"
  if(m==="warm") formData.style="warm light, cozy, home feeling"
  if(m==="luxury") formData.style="luxury, premium, high-end, elegant"

  buildPrompt()
  document.getElementById("generator").scrollIntoView({behavior:"smooth"})
}

/* ===== prompt ===== */

function buildPrompt(){
  document.getElementById("finalPrompt").innerText =
`scene: ${formData.scene}
mood: ${formData.mood}
style: ${formData.style}
one celadon tea set, clean composition`
}

/* ===== 生成 ===== */

async function generate(){
  const res = await fetch("http://127.0.0.1:8000/generate",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      scene:formData.scene,
      mood:formData.mood,
      packaging:formData.packaging,
      style:formData.style,   // ✅ 关键
      purpose:"self",
      custom:"",
      batch:3
    })
  })

  const data = await res.json()
  const container = document.getElementById("results")
  container.innerHTML=""

  data.images.forEach(url=>{
    const card=document.createElement("div")
    card.className="image-card"

    const img=document.createElement("img")
    img.src=url
    img.onclick=()=>openModal(url)

    const btn=document.createElement("button")
    btn.innerText="下载"
    btn.onclick=()=>downloadImage(url)

    card.appendChild(img)
    card.appendChild(btn)

    container.appendChild(card)
  })
}

/* ===== 工具 ===== */

function openModal(url){
  document.getElementById("modalImg").src=url
  document.getElementById("modal").style.display="flex"
}
function closeModal(){
  document.getElementById("modal").style.display="none"
}

function downloadImage(url){
  window.open(`http://127.0.0.1:8000/download?url=${encodeURIComponent(url)}`)
}

function confirmScene(){
  document.getElementById("bar").style.width="100%"
  alert("进入产品设计流程")
}

function resetAll(){
  currentStepIndex=0
  formData = {
    purpose:null,
    packaging:null,
    deadline:null,
    scene:null,
    mood:null,
    style:""
  }
  showStep("step1")
  updateProgress()
  document.getElementById("results").innerHTML=""
}

/* init */
updateProgress()

</script>

</body>
</html>
