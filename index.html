<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>青瓷定制 - 场景氛围确认系统</title>
<style>
  :root { --primary-color: #4a6a5e; --bg-color: #fcfcfc; }
  body { font-family: "Microsoft YaHei", sans-serif; padding: 40px; background: var(--bg-color); color: #333; line-height: 1.6; }
  h2, h3 { color: var(--primary-color); }
  #progress { width: 100%; height: 6px; background: #eee; border-radius: 10px; margin-bottom: 20px; overflow: hidden; }
  #bar { height: 100%; width: 0%; background: var(--primary-color); transition: 0.5s; }
  .step { display: none; margin-top: 30px; animation: fadeIn 0.4s; }
  .active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  #topControls { margin-bottom: 30px; display: flex; gap: 15px; }
  button { padding: 10px 20px; border: 1px solid var(--primary-color); background: white; color: var(--primary-color); cursor: pointer; border-radius: 4px; transition: 0.2s; }
  button:hover { background: var(--primary-color); color: white; }
  .btn-main { background: var(--primary-color); color: white; font-weight: bold; border: none; }
  .options-grid { display: flex; gap: 10px; margin-top: 10px; }
  #generator { margin-top: 60px; border-top: 1px solid #ddd; padding-top: 40px; }
  #finalPromptBox { background: #f0f4f2; padding: 20px; border-radius: 8px; border-left: 5px solid var(--primary-color); margin-bottom: 20px; font-size: 15px; }
  #results { display: flex; gap: 25px; flex-wrap: wrap; margin-top: 20px; min-height: 200px; }
  .image-card { background: white; padding: 10px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-align: center; }
  .image-card img { width: 400px; height: auto; border-radius: 8px; display: block; margin-bottom: 10px; cursor: zoom-in; }
  #loading { display: none; color: var(--primary-color); font-weight: bold; margin: 20px 0; }
  #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; z-index: 1000; }
  #modal img { max-width: 90%; max-height: 90%; border: 2px solid #fff; }
  
  /* 留言框样式 */
  .custom-area { margin: 20px 0; }
  #customInput { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; box-sizing: border-box; }
</style>
</head>
<body>

<h2>青瓷定制引导：场景确认</h2>
<p style="color:#666;">通过简单的选择，我们将为您生成专属的展示氛围参考图。</p>

<div id="progress"><div id="bar"></div></div>

<div id="topControls">
  <button id="prevBtn" onclick="prevStep()">⬅ 上一步</button>
  <button id="nextBtn" onclick="nextAuto()">下一步 ➡</button>
  <button onclick="resetAll()">🔄 重新开始</button>
</div>

<div class="step active" id="step0">
  <h3>0. 选择渲染模式与风格</h3>
  <div class="options-grid">
    <button onclick="setChoice('model_type', 'realistic', '高清写实', 'step1')">高清写实 (旗舰引擎)</button>
    <button onclick="setChoice('model_type', 'artistic', '意境艺术', 'step1')">意境艺术 (旗舰引擎)</button>
    <button onclick="setChoice('model_type', 'fast', '快速预览', 'step1')">快速预览 (轻量引擎)</button>
  </div>
  <p style="font-size: 12px; color: #888; margin-top: 10px;">
    * 注：<b>旗舰引擎</b> 采用 SDXL 架构，适合最终效果确认；<b>轻量引擎</b> 速度极快，适合初期构图调整。
  </p>
</div>

<div class="step" id="step1">
  <h3>1. 您的定制用途是？</h3>
  <div class="options-grid">
    <button onclick="setChoice('purpose', 'self', '个人收藏', 'step2_pack')">自己收藏/日常使用</button>
    <button onclick="setChoice('purpose', 'gift', '商务礼赠', 'step2_pack')">商务馈赠/亲友礼品</button>
  </div>
</div>

<div class="step" id="step2_pack">
  <h3>2. 您倾向的包装风格？</h3>
  <div class="options-grid">
    <button onclick="setChoice('packaging', 'none', '简约环保', 'step4')">简约包装</button>
    <button onclick="setChoice('packaging', 'simple', '精装礼盒', 'step4')">精装礼盒</button>
    <button onclick="setChoice('packaging', 'premium', '高端木盒', 'step4')">高端定制</button>
  </div>
</div>

<div class="step" id="step4">
  <h3>3. 希望青瓷出现在什么场景？</h3>
  <div class="options-grid">
    <button onclick="setChoice('scene', 'tea room', '中式茶室', 'step5')">中式茶室</button>
    <button onclick="setChoice('scene', 'home', '现代家居', 'step5')">现代家居</button>
    <button onclick="setChoice('scene', 'office', '办公书房', 'step5')">办公书房</button>
    <button onclick="setChoice('scene', 'gallery', '艺术展柜', 'step5')">艺术展柜</button>
  </div>
</div>

<div class="step" id="step5">
  <h3>4. 您追求的整体氛围感？</h3>
  <div class="options-grid">
    <button onclick="setChoice('mood', 'zen', '禅意空灵', null)">禅意 (静谧)</button>
    <button onclick="setChoice('mood', 'warm', '温暖柔和', null)">温暖 (柔和)</button>
    <button onclick="setChoice('mood', 'luxury', '高雅沉稳', null)">高雅 (质感)</button>
  </div>
</div>

<div id="generator">
  <h2>氛围预览生成</h2>
  
  <div id="finalPromptBox">
    <strong>当前选择：</strong> <span id="summaryText">尚未完成选择</span>
  </div>

  <div class="custom-area">
    <label style="font-weight: bold; display: block; margin-bottom: 8px;">特别要求/客户留言：</label>
    <input type="text" id="customInput" placeholder="在此输入额外需求，如：背景有一支梅花、窗外在下雨、桌面有水渍感等...">
  </div>

  <button class="btn-main" id="genBtn" onclick="generate()" style="padding: 15px 40px; font-size: 18px;">开始 AI 渲染生成</button>
  
  <div id="loading">AI 正在根据您的选择进行多场景渲染，预计需要 30 秒，请稍候...</div>
  <div id="results"></div>
</div>

<div id="modal" onclick="closeModal()"><img id="modalImg"></div>

<script>
// 更新后的步骤数组，包含 step0
let steps = ["step0", "step1", "step2_pack", "step4", "step5"];
let currentStepIndex = 0;

let formData = {
  model_type: "realistic", 
  model_label: "写实摄影",
  purpose: "self", purpose_label: "个人收藏",
  packaging: "none", packaging_label: "简约环保",
  scene: "", scene_label: "未选",
  mood: "", mood_label: "未选",
  style: ""
};

function updateProgress() {
  let percent = (currentStepIndex / (steps.length - 1)) * 100;
  document.getElementById("bar").style.width = percent + "%";
  document.getElementById("prevBtn").disabled = currentStepIndex === 0;
  document.getElementById("nextBtn").disabled = currentStepIndex === steps.length - 1;
}

function showStep(id) {
  document.querySelectorAll(".step").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  currentStepIndex = steps.indexOf(id);
  updateProgress();
}

function prevStep() { if (currentStepIndex > 0) showStep(steps[currentStepIndex - 1]); }
function nextAuto() { if (currentStepIndex < steps.length - 1) showStep(steps[currentStepIndex + 1]); }

function setChoice(key, id, label, nextId) {
  formData[key] = id;
  formData[key + "_label"] = label;
  
  if (key === 'mood') {
    const moodMap = {
      "zen": "wabi-sabi, cinematic fog, tea smoke",
      "warm": "warm glow, golden hour, wooden textures",
      "luxury": "high contrast, studio lighting, elegant reflections"
    };
    formData.style = moodMap[id];
  }
  
  updateSummary();
  if (nextId) showStep(nextId);
}

function updateSummary() {
  // 正确体现模型风格的数据
  const summary = `风格：${formData.model_label} | 用途：${formData.purpose_label} | 包装：${formData.packaging_label} | 场景：${formData.scene_label} | 氛围：${formData.mood_label}`;
  document.getElementById("summaryText").innerText = summary;
}

async function generate() {
  if (!formData.scene || !formData.mood) { alert("请完成前方的定制引导步骤"); return; }
  
  const genBtn = document.getElementById("genBtn");
  const resultsDiv = document.getElementById("results");
  const customTxt = document.getElementById("customInput").value;

  genBtn.disabled = true;
  document.getElementById("loading").style.display = "block";
  resultsDiv.innerHTML = "";

  try {
    const res = await fetch("http://127.0.0.1:8000/generate", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
          model_type: formData.model_type,
          scene: formData.scene,
          mood: formData.mood,
          packaging: formData.packaging,
          style: formData.style,
          purpose: formData.purpose,
          custom: customTxt, // 发送留言数据
          batch: 3
        })
    });
    
    const data = await res.json();
    if (!data.images || data.images.length === 0) { alert("生成超时或后端未响应"); return; }

    data.images.forEach((url, index) => {
      const card = document.createElement("div");
      card.className = "image-card";
      
      const img = document.createElement("img");
      const proxyUrl = `http://127.0.0.1:8000/download?url=${encodeURIComponent(url)}&t=${Date.now()}`;
      img.src = proxyUrl;
      img.title = "点击查看高清图";
      img.onclick = () => { 
        document.getElementById("modalImg").src = proxyUrl; 
        document.getElementById("modal").style.display = "flex"; 
      };
      
      const btn = document.createElement("button");
      btn.className = "btn-main";
      btn.style.marginTop = "10px";
      btn.innerText = (index === 1 && formData.packaging !== 'none') ? "选定包装方案" : "选定此场景";
      
      card.appendChild(img);
      card.appendChild(btn);
      resultsDiv.appendChild(card);
    });
  } catch (e) { 
    alert("连接失败，请检查后端 Python 服务是否运行"); 
  } finally { 
    genBtn.disabled = false; 
    document.getElementById("loading").style.display = "none"; 
  }
}

function closeModal() { document.getElementById("modal").style.display = "none"; }
function resetAll() { if(confirm("确定要重置所有选项吗？")) location.reload(); }

// 初始化进度条
updateProgress();
</script>
</body>
</html>
